name: build-portable

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a release on tag pushes

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore llmocr.sln

      - name: Publish portable (self-contained, single file)
        run: >
          dotnet publish app/llmocr.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -o publish

      - name: Bundle DjVuLibre + docs
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force DjVuLibre publish/DjVuLibre
          Copy-Item -Force README.md, LICENSE publish/
          if (Test-Path INSTALL.md) { Copy-Item -Force INSTALL.md publish/ }

      - name: Zip portable
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath llmocr-portable-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llmocr-portable-win-x64
          path: llmocr-portable-win-x64.zip

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: llmocr-portable-win-x64.zip
          generate_release_notes: true
